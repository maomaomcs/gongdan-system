server:
  port: 8080

spring:
  application:
    name: ticket-system
  datasource:
    url: jdbc:mysql://localhost:3306/ticket_system?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=utf8&createDatabaseIfNotExist=true
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update          # 自动建表/更新表结构
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

# 业务配置
app:
  admin-password: ${ADMIN_PASSWORD:admin123}
  categories:
    - 电脑/主机
    - 投影仪
    - 电子白板/触控屏
    - 网络/网线
    - 音响/话筒
    - 打印机
    - 电源/插座
    - 软件问题
    - 其他
  statuses:
    - 待处理
    - 处理中
    - 已解决
    - 已关闭
  urgencies:
    - 普通
    - 紧急
